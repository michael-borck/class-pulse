{% extends "layout.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<h2 class="text-2xl font-semibold mb-2 text-center">Reset your password</h2>
<p class="text-center text-sm text-gray-600 mb-6 max-w-md mx-auto">
    Enter the code we emailed you and choose a new password.
</p>
<form action="{{ url_for('reset_password') }}" method="post" class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-md">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-4">
        <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" id="email" name="email" required
               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm"
               value="{{ email or '' }}">
    </div>
    <div class="mb-4">
        <label for="code" class="block text-sm font-medium text-gray-700">Reset code</label>
        <input type="text" id="code" name="code" required autocomplete="one-time-code"
               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm tracking-widest uppercase"
               placeholder="XXXXXXXX">
    </div>
    <div class="mb-4">
        <label for="password" class="block text-sm font-medium text-gray-700">New password</label>
        <input type="password" id="password" name="password" required minlength="10"
               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
    </div>
    <div class="mb-6">
        <label for="confirm_password" class="block text-sm font-medium text-gray-700">Confirm new password</label>
        <input type="password" id="confirm_password" name="confirm_password" required minlength="10"
               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
    </div>
    <button type="submit" class="btn btn-primary w-full">Reset password</button>
</form>
<p class="text-center mt-4 text-sm">
    Need a new code? <a href="{{ url_for('forgot_password') }}" class="text-indigo-600 hover:text-indigo-800">Request another</a>
</p>
{% endblock %}
