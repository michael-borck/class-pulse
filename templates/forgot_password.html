{% extends "layout.html" %}
{% block title %}Forgot Password{% endblock %}

{% block content %}
<h2 class="text-2xl font-semibold mb-2 text-center">Forgot your password?</h2>
<p class="text-center text-sm text-gray-600 mb-6 max-w-md mx-auto">
    Enter your email and we'll send you a code to reset it.
</p>
<form action="{{ url_for('forgot_password') }}" method="post" class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-md">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-6">
        <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" id="email" name="email" required
               class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
    </div>
    <button type="submit" class="btn btn-primary w-full">Send reset code</button>
</form>
<p class="text-center mt-4 text-sm">
    <a href="{{ url_for('login') }}" class="text-indigo-600 hover:text-indigo-800">Back to login</a>
</p>
{% endblock %}
