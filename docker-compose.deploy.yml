# Deploy the CI-published image behind Caddy.
#
# Unlike docker-compose.yml (which builds from source), this file PULLS the
# prebuilt multi-arch image from GHCR that the GitHub Actions workflow publishes.
#
# Usage:
#   ./scripts/generate-secrets.sh                          # one-time: writes .env
#   docker compose -f docker-compose.deploy.yml up -d      # start
#   docker compose -f docker-compose.deploy.yml logs -f    # tail
#   docker compose -f docker-compose.deploy.yml pull       # update to latest
#
# SECRET_KEY comes from ./.env (auto-loaded by Compose for ${VAR} interpolation)
# and must stay stable — changing it logs everyone out. AI provider settings
# (AI_PROVIDER, AI_BASE_URL, AI_API_KEY, AI_MODEL) and email settings
# (EMAIL_PROVIDER, RESEND_API_KEY, SMTP_*, MAIL_FROM, ALLOWED_DOMAINS, ...) are
# optional and also read from .env; see .env.example for the full list. Leave AI
# blank to disable generation, and email blank to log codes instead of sending.

services:
  web:
    # Override in .env (IMAGE=...) if you fork/rename; defaults to upstream.
    image: ${IMAGE:-ghcr.io/michael-borck/class-pulse:latest}
    ports:
      # localhost only — Caddy reverse_proxies here. Never expose 5000 directly.
      - "127.0.0.1:5000:5000"
    environment:
      # Fail loudly if SECRET_KEY is missing (same convention as docker-compose.yml).
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env — run scripts/generate-secrets.sh}
      - SOCKETIO_ASYNC_MODE=threading
      # Caddy terminates TLS one hop away: trust its X-Forwarded-* headers so
      # rate limits key on the real client IP and join URLs/QR codes use https.
      - TRUST_PROXY=1
      # Cookies only over HTTPS (Caddy serves HTTPS to the world).
      - SESSION_COOKIE_SECURE=true
      # AI provider (optional — blank disables generation). See .env.example.
      - AI_PROVIDER=${AI_PROVIDER:-}
      - AI_BASE_URL=${AI_BASE_URL:-}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-}
      - AI_ENABLED=${AI_ENABLED:-}
      # Email for registration verification + password reset. Defaults to 'dev'
      # (logs codes instead of sending) when EMAIL_PROVIDER is blank; set a real
      # provider + credentials in .env to send mail. See .env.example.
      - EMAIL_PROVIDER=${EMAIL_PROVIDER:-}
      - MAIL_FROM=${MAIL_FROM:-}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - SMTP_SERVER=${SMTP_SERVER:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-}
      - SMTP_USE_SSL=${SMTP_USE_SSL:-}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD:-}
      - EMAIL_CODE_TTL_MIN=${EMAIL_CODE_TTL_MIN:-}
      # Optional: restrict registration to these email domains (comma-separated).
      - ALLOWED_DOMAINS=${ALLOWED_DOMAINS:-}
    volumes:
      # Persist the SQLite DB across image updates. The container runs as UID
      # 1000; if your host user isn't UID 1000: sudo chown -R 1000:1000 instance
      - ./instance:/app/instance
    restart: unless-stopped
    # Grab the newest published :latest on each `up`. Drop if you pin a tag.
    pull_policy: always
